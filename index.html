<!DOCTYPE html>
<html>
<head>
<title>Restaurant Menu</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#2c3e50;
color:white;
text-align:center;
padding:20px;
font-size:28px;
}

.menu-buttons{
text-align:center;
padding:20px;
}

.menu-buttons button{
padding:10px 20px;
margin:5px;
border:none;
background:#e67e22;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.menu-buttons button:hover{
background:#d35400;
}

.menu-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.menu-item{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.menu-item:hover{
transform:scale(1.05);
}

.menu-item img{
width:100%;
height:160px;
object-fit:cover;
}

.menu-info{
padding:15px;
text-align:center;
}

.price{
color:#e67e22;
font-weight:bold;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
background:#2c3e50;
color:white;
}

</style>
</head>

<body>

<header>
Restaurant Menu
</header>

<div class="menu-buttons">
<button onclick="filterMenu('all')">All</button>
<button onclick="filterMenu('starter')">Starters</button>
<button onclick="filterMenu('main')">Main Course</button>
<button onclick="filterMenu('dessert')">Desserts</button>
</div>

<div class="menu-container">

<div class="menu-item starter">
<img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=800&q=60">
<div class="menu-info">
<h3>French Fries</h3>
<p>Crispy potato fries</p>
<div class="price">₹120</div>
</div>
</div>

<div class="menu-item starter">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div class="menu-info">
<h3>Burger</h3>
<p>Cheese loaded burger</p>
<div class="price">₹180</div>
</div>
</div>

<div class="menu-item main">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<div class="menu-info">
<h3>Pizza</h3>
<p>Italian style pizza</p>
<div class="price">₹350</div>
</div>
</div>

<div class="menu-item main">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<div class="menu-info">
<h3>Pasta</h3>
<p>Creamy white pasta</p>
<div class="price">₹260</div>
</div>
</div>

<div class="menu-item dessert">
<img src="https://images.unsplash.com/photo-1551024506-0bccd828d307">
<div class="menu-info">
<h3>Ice Cream</h3>
<p>Vanilla chocolate scoop</p>
<div class="price">₹90</div>
</div>
</div>

<div class="menu-item dessert">
<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=800&q=60">
<div class="menu-info">
<h3>Chocolate Cake</h3>
<p>Rich chocolate dessert</p>
<div class="price">₹150</div>
</div>
</div>

</div>

<footer>
© 2026 Delicious Restaurant
</footer>

<script>

function filterMenu(category){

let items=document.getElementsByClassName("menu-item");

for(let i=0;i<items.length;i++){

if(category==="all"){
items[i].style.display="block";
}

else if(items[i].classList.contains(category)){
items[i].style.display="block";
}

else{
items[i].style.display="none";
}

}

}

</script>

</body>
</html>
